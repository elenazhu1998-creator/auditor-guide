<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内审员 AI 助手使用指南</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--bg-card:#131314;--card:#1F1F1F;--border:#2a2a2a;--border-hi:#3A3A3A;--fg:#FAFAFA;--muted:#AFB5BE;--dim:#737373;--blue:#2563EB;--blue-b:#2168FD;--blue-light:#93C5FD;--teal-light:#3AE4C9;--green:#4ADE80;--grad:linear-gradient(90deg,#2168FD 0%,#1E71FA 22%,#37B1D3 55%,#39D6CB 78%,#3AE4C9 100%);--grad-d:linear-gradient(135deg,#2168FD 0%,#37B1D3 50%,#3AE4C9 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
.gt{background:var(--grad-d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.f{opacity:0;transform:translateY(14px);transition:opacity .55s ease,transform .55s ease}
.f.v{opacity:1;transform:none}
.f.d1{transition-delay:.07s}.f.d2{transition-delay:.14s}.f.d3{transition-delay:.21s}.f.d4{transition-delay:.28s}.f.d5{transition-delay:.35s}.f.d6{transition-delay:.42s}
</style>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script>tailwind.config={darkMode:"class",theme:{extend:{fontFamily:{manrope:["Manrope","system-ui","sans-serif"]}}}};</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
window.exports={};
window.module={exports:window.exports};
var __m={"react":window.React,"react-dom":window.ReactDOM,"react-dom/client":window.ReactDOM};
var __noop=function(){return null};
var __fb=new Proxy({},{get:function(_,p){return p==="__esModule"?true:__noop}});
window.require=function(n){return __m[n]||__fb};
__m["/utils/slide-images"]={
  searchImage:function(){return Promise.resolve(null);},
  generateImage:function(){return Promise.resolve(null);},
  imageToBase64:function(u){
    if(!u)return Promise.resolve(null);
    if(u.startsWith("image/")||u.startsWith("data:image/"))return Promise.resolve(u.replace(/^data:/,""));
    return fetch(u).then(function(r){return r.blob()}).then(function(b){
      return new Promise(function(res){var rd=new FileReader();rd.onloadend=function(){res(rd.result?rd.result.replace(/^data:/,""):null)};rd.onerror=function(){res(null)};rd.readAsDataURL(b)})},

</head>
<body>

<div id="root"></div>
<script type="text/babel" data-presets="env,react,typescript">
import { useState } from "react";

const accentGrad = "linear-gradient(90deg, #2266FF, #00E5D1)";

function Tag({ children, color }) {
  const colors = {
    blue: { bg: "#0d2a5e", border: "#2266FF", text: "#99FFFF" },
    green: { bg: "#003d35", border: "#00E5D1", text: "#00E5D1" },
    purple: { bg: "#1e0a4a", border: "#6423FF", text: "#c9a8ff" },
    orange: { bg: "#3d2000", border: "#FCA91A", text: "#FCA91A" },
  };
  const c = colors[color] || colors.blue;
  return (
    <span style={{ background: c.bg, border: `1px solid ${c.border}`, color: c.text, borderRadius: 6, padding: "2px 10px", fontSize: 13, fontWeight: 700, fontFamily: "Arial", display: "inline-block" }}>
      {children}
    </span>
  );
}

function SectionTitle({ children, sub }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: sub ? 8 : 0 }}>
        <div style={{ width: 4, height: 28, borderRadius: 2, background: accentGrad, flexShrink: 0 }} />
        <h2 style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 22, color: "#ffffff", margin: 0 }}>{children}</h2>
      </div>
      {sub && <p style={{ fontFamily: "Arial", fontSize: 15, color: "#82828B", margin: "6px 0 0 16px", lineHeight: 1.6 }}>{sub}</p>}
    </div>
  );
}

function PromptBox({ title, prompt, tag, tagColor }) {
  const [copied, setCopied] = useState(false);
  return (
    <div style={{ background: "#1F1F1F", border: "1px solid #2a2a2a", borderRadius: 12, marginBottom: 20, overflow: "hidden" }}>
      <div style={{ padding: "14px 20px 10px 20px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #2a2a2a", flexWrap: "wrap" }}>
        <span style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 16, color: "#fff", flex: 1 }}>{title}</span>
        {tag && <Tag color={tagColor || "blue"}>{tag}</Tag>}
        <button
          onClick={() => { navigator.clipboard && navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(() => setCopied(false), 2000); }}
          style={{ background: copied ? "#003d35" : "#0d1f3c", border: `1px solid ${copied ? "#00E5D1" : "#2266FF"}`, color: copied ? "#00E5D1" : "#99FFFF", borderRadius: 6, padding: "4px 14px", fontSize: 13, fontFamily: "Arial", cursor: "pointer", fontWeight: 600 }}>
          {copied ? "✓ 已复制" : "复制"}
        </button>
      </div>
      <pre style={{ margin: 0, padding: "16px 20px", fontFamily: "Arial", fontSize: 14, color: "#cccccc", whiteSpace: "pre-wrap", lineHeight: 1.7 }}>{prompt}</pre>
    </div>
  );
}

function ChatBubble({ role, text, isAi }) {
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 16, flexDirection: isAi ? "row" : "row-reverse" }}>
      <div style={{ width: 36, height: 36, borderRadius: "50%", background: isAi ? accentGrad : "#333", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Arial", fontWeight: 700, fontSize: 13, color: isAi ? "#000" : "#fff", flexShrink: 0 }}>
        {isAi ? "AI" : "我"}
      </div>
      <div style={{ maxWidth: "80%", background: isAi ? "#1a2a1a" : "#1a1a2a", border: `1px solid ${isAi ? "#00E5D1" : "#2266FF"}`, borderRadius: isAi ? "4px 12px 12px 12px" : "12px 4px 12px 12px", padding: "12px 16px" }}>
        <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 13, color: isAi ? "#00E5D1" : "#99FFFF", marginBottom: 6 }}>{role}</div>
        <div style={{ fontFamily: "Arial", fontSize: 15, color: "#cccccc", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{text}</div>
      </div>
    </div>
  );
}

function OverviewSection() {
  return (
    <div>
      <SectionTitle sub="了解 AI 助手能为内审员做什么">功能概览</SectionTitle>
      <div style={{ background: "#1F1F1F", border: "1px solid #2266FF", borderRadius: 12, padding: "20px 24px", marginBottom: 28 }}>
        <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 17, color: "#99FFFF", marginBottom: 12 }}>什么是 ATLAS IMS AI 助手？</div>
        <div style={{ fontFamily: "Arial", fontSize: 15, color: "#cccccc", lineHeight: 1.8 }}>
          ATLAS IMS AI 助手是专为内审员设计的智能辅助工具。无论你是第一次参加内审的新手，还是有经验但审核不同部门/条款的审核员，AI 助手都可以帮你快速准备、现场指导、整理记录，大幅减少查资料、想问题、写描述的时间。支持 ISO 9001 / ISO 14001 / ISO 45001 / ISO 22301 以及 RBA VAP V8.0.2 全标准覆盖。
        </div>
      </div>
      <SectionTitle sub="普通内审员的需求和审核组长完全不同">内审员 vs 审核组长：需求差异</SectionTitle>
      <div style={{ overflowX: "auto", marginBottom: 28 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Arial", fontSize: 15 }}>
          <thead>
            <tr style={{ background: "#1a1a1a" }}>
              {["角色", "主要需求", "AI 帮助重点"].map(h => (
                <th key={h} style={{ padding: "12px 18px", color: "#99FFFF", fontWeight: 700, textAlign: "left", borderBottom: "2px solid #2266FF", fontSize: 14 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            <tr style={{ background: "#0d1f3c", borderBottom: "1px solid #2a2a2a" }}>
              <td style={{ padding: "14px 18px", color: "#99FFFF", fontWeight: 700 }}>内审员（你）</td>
              <td style={{ padding: "14px 18px", color: "#cccccc" }}>如何审核、问什么问题、如何记录</td>
              <td style={{ padding: "14px 18px", color: "#cccccc" }}>审核前准备 · 现场即时指导 · 记录整理</td>
            </tr>
            <tr style={{ background: "#131314", borderBottom: "1px solid #2a2a2a" }}>
              <td style={{ padding: "14px 18px", color: "#82828B" }}>审核组长</td>
              <td style={{ padding: "14px 18px", color: "#82828B" }}>如何汇总、如何报告、如何分类</td>
              <td style={{ padding: "14px 18px", color: "#82828B" }}>报告生成 · 条款匹配 · PPT 制作</td>
            </tr>
          </tbody>
        </table>
      </div>
      <SectionTitle sub="内审员最需要 AI 帮助的 5 个核心场景">5 大核心功能</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16, marginBottom: 28 }}>
        {[
          { num: "01", title: "生成审核问题清单", desc: "输入被审核部门和条款，AI 自动生成 10+ 条针对性问题，并告诉你要查哪些文件和记录", color: "#2266FF" },
          { num: "02", title: "条款通俗解释", desc: "把复杂的 ISO/RBA 条款翻译成日常工作语言，告诉你实际要查什么，如何判断是否符合", color: "#00E5D1" },
          { num: "03", title: "现场记录助手", desc: "用口语描述你看到的问题，AI 帮你整理成规范的客观证据，并判断 NC / OFI / Strength", color: "#6423FF" },
          { num: "04", title: "中英文翻译", desc: "用中文记录审核发现，AI 自动生成专业英文版本，提供中英对照，方便录入系统", color: "#FCA91A" },
          { num: "05", title: "标准要求解释", desc: "被审核方质疑时，AI 帮你用简单语言解释标准要求，增强审核的说服力和权威性", color: "#E5002F" },
        ].map(f => (
          <div key={f.num} style={{ background: "#131314", border: "1px solid #2a2a2a", borderRadius: 12, padding: "20px", borderTop: `3px solid ${f.color}` }}>
            <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 28, color: f.color, marginBottom: 8 }}>{f.num}</div>
            <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 16, color: "#fff", marginBottom: 8 }}>{f.title}</div>
            <div style={{ fontFamily: "Arial", fontSize: 14, color: "#aaa", lineHeight: 1.65 }}>{f.desc}</div>
          </div>
        ))}
      </div>
      <SectionTitle sub="使用 AI 前后的时间对比">效率对比</SectionTitle>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Arial", fontSize: 15 }}>
          <thead>
            <tr style={{ background: "#1a1a1a" }}>
              {["任务", "传统方式", "使用 AI", "节省时间"].map(h => (
                <th key={h} style={{ padding: "12px 18px", color: "#99FFFF", fontWeight: 700, textAlign: "left", borderBottom: "2px solid #2266FF", fontSize: 14 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[
              { task: "条款匹配", trad: "15-20 分钟", ai: "1-2 分钟", save: "90%" },
              { task: "发现陈述撰写", trad: "10-15 分钟", ai: "1 分钟", save: "93%" },
              { task: "法律法规查询", trad: "20-30 分钟", ai: "2 分钟", save: "93%" },
              { task: "PPT 报告制作", trad: "15-20 分钟", ai: "30 秒", save: "97%" },
              { task: "单个发现总计", trad: "60-85 分钟", ai: "5 分钟", save: "94%", total: true },
            ].map((r, i) => (
              <tr key={i} style={{ background: r.total ? "#0d2a0d" : "#131314", borderBottom: "1px solid #2a2a2a" }}>
                <td style={{ padding: "12px 18px", color: r.total ? "#00E5D1" : "#ccc", fontWeight: r.total ? 700 : 400 }}>{r.task}</td>
                <td style={{ padding: "12px 18px", color: "#82828B" }}>{r.trad}</td>
                <td style={{ padding: "12px 18px", color: r.total ? "#00E5D1" : "#ccc", fontWeight: r.total ? 700 : 400 }}>{r.ai}</td>
                <td style={{ padding: "12px 18px" }}>
                  <span style={{ background: "#003d1a", border: "1px solid #00E5D1", color: "#00E5D1", borderRadius: 6, padding: "2px 10px", fontWeight: 700, fontSize: 14 }}>{r.save}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BeforeSection() {
  return (
    <div>
      <SectionTitle sub="收到审核任务后，用这些 Prompt 快速做好准备">审核前准备</SectionTitle>
      <div style={{ background: "#1a1a0a", border: "1px solid #FCA91A", borderRadius: 12, padding: "16px 20px", marginBottom: 28 }}>
        <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 15, color: "#FCA91A", marginBottom: 8 }}>审核前准备检查清单</div>
        {["了解被审核部门的基本职能和流程", "明确本次审核的条款范围", "查阅上次审核的发现（如有）", "生成针对性的审核问题清单", "准备好要检查的文件和记录清单"].map((item, i) => (
          <div key={i} style={{ fontFamily: "Arial", fontSize: 15, color: "#cccccc", padding: "4px 0", display: "flex", gap: 10 }}>
            <span style={{ color: "#FCA91A" }}>☐</span>{item}
          </div>
        ))}
      </div>
      <PromptBox title="Prompt 1：快速了解审核任务（收到任务后第一件事）" tag="必用" tagColor="orange"
        prompt={`我被分配审核 [部门名称] 的 [条款/过程]，请帮我快速了解：

1. 这个条款/过程的核心要求是什么？
2. 我应该准备哪些审核问题？
3. 需要查看哪些文件和记录？
4. 以往这个领域常见的问题有哪些？

示例填写：
我被分配审核 HR 部门的 ISO 9001 条款 7.2 能力管理，请帮我快速了解……`} />
      <PromptBox title="Prompt 2：生成完整审核问题清单（审核前最重要的准备）" tag="强烈推荐" tagColor="blue"
        prompt={`我要审核 [部门名称] 的 [过程/条款]，请帮我生成审核问题清单。

审核信息：
- 被审核部门：[如：文件控制部门 / 生产部门 / HR 部门]
- 审核条款：[如：ISO 9001 条款 4.2 文件控制 / ISO 45001 条款 6.1 风险评估]
- 审核重点：[可选，如：上次审核发现的问题 / 新员工培训 / 设备管理]

请提供：
1. 具体的审核问题（至少 10 个）
2. 每个问题要查看的证据类型
3. 常见的不符合项示例`} />
      <PromptBox title="Prompt 3：条款通俗解释（看不懂标准时使用）" tag="新手必用" tagColor="green"
        prompt={`请用简单的语言解释以下条款，并告诉我审核时应该看什么：

条款：[完整条款内容或条款编号]
例如：ISO 14001:2015 条款 6.1.2 环境因素识别
例如：ISO 22301:2019 条款 8.4 业务连续性计划

请提供：
1. 通俗易懂的条款解释（用实际工作场景举例）
2. 审核时要检查的具体内容（文件、记录、现场）
3. 如何判断是否符合要求
4. 常见的不符合项案例`} />
      <SectionTitle sub="客观证据写得好，审核发现才有说服力">客观证据撰写要点</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
        <div style={{ background: "#0d2a0d", border: "1px solid #00E5D1", borderRadius: 12, padding: "18px 20px" }}>
          <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 15, color: "#00E5D1", marginBottom: 12 }}>好的客观证据</div>
          {["包含时间、地点、涉及人员", "描述具体问题，可验证", "中英文均可，AI 自动处理翻译", "基于实际观察、记录、文件"].map((t, i) => (
            <div key={i} style={{ fontFamily: "Arial", fontSize: 14, color: "#ccc", padding: "3px 0" }}>· {t}</div>
          ))}
          <div style={{ marginTop: 12, background: "#0a1a0a", borderRadius: 8, padding: "10px 14px", fontFamily: "Arial", fontSize: 13, color: "#aaa", lineHeight: 1.6 }}>
            <span style={{ color: "#00E5D1", fontWeight: 700 }}>示例：</span> 「2025年5月15日，在生产车间发现叉车警示标识仅有英文，缺少中文翻译，不符合双语标识要求。」
          </div>
        </div>
        <div style={{ background: "#2a0a0a", border: "1px solid #E5002F", borderRadius: 12, padding: "18px 20px" }}>
          <div style={{ fontFamily: "Arial", fontWeight: 700, fontSize: 15, color: "#ff8099", marginBottom: 12 }}>避免这样写</div>
          {["包含主观判断（「我认为」「可能」）", "描述模糊，无法核实", "只写结论，没有具体事实", "使用情绪化语言"].map((t, i) => (
            <div key={i} style={{ fontFamily: "Arial", fontSize: 14, color: "#ccc", padding: "3px 0" }}>· {t}</div>
          ))}
          <div style={{ marginTop: 12, background: "#1a0a0a", borderRadius: 8, padding: "10px 14px", fontFamily: "Arial", fontSize: 13, color: "#aaa", lineHeight: 1.6 }}>
            <span style={{ color: "#ff8099", fontWeight: 700 }}>示例：</span> 「标识可能不够清楚。」
          </div>
        </div>
      </div>
    </div>
  );
}

function DuringSection() {
  return (
    <div>
      <SectionTitle sub="现场发现问题时，即时使用这些 Prompt">审核中使用</SectionTitle>
      <PromptBox title="Prompt 4：现场发现问题----不确定是否算问题" tag="现场必用" tagColor="green"
        prompt={`我在审核现场看到以下情况，请帮我判断这算不算问题：

我看到的情况：[用口语化描述，可以是中文]

例如：
· 「设备上的标签日期过期了」
· 「员工说没有收到过这个培训」
· 「文件柜里的文件版本和系统里不一样」

请帮我：
1. 判断这是否构成不符合项
2. 分类：NC（不符合）/ OFI（改进机会）/ Strength（优势）
3. 建议可能适用的条款
4. 整理成规范的客观证据描述`} />
      <PromptBox title="Prompt 5：不知道如何规范描述（现场笔记整理）" tag="现场必用" tagColor="green"
        prompt={`我发现了一个问题，但不知道怎么用规范的语言描述，请帮我整理：

我的口语记录：[直接写你看到/听到的情况，不用担心格式]

请帮我：
1. 整理成规范的客观证据描述（中文）
2. 翻译成英文（用于系统录入）
3. 提供中英文对照版本`} />
      <PromptBox title="Prompt 6：被审核方质疑----需要解释标准要求" tag="现场使用" tagColor="purple"
        prompt={`被审核方正在质疑我的审核发现，请帮我解释标准要求：

审核的条款：[条款编号和名称]
我发现的问题：[问题描述]
被审核方的质疑：[他们说的话]

例如：
条款：ISO 9001 条款 7.5 文件化信息
我发现：共享盘里的文件没有版本号和审批记录
质疑：「我们的文件大家都能访问，为什么不符合？」

请帮我用简单易懂的语言解释标准的具体要求。`} />
      <SectionTitle sub="快速判断发现类型">NC / OFI / Strength 判断指南</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16, marginBottom: 28 }}>
        {[
